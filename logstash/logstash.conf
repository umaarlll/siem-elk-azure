input {
  file {
    path => "/logs/elk-dataset-1.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["dataset1"]
  }
  file {
    path => "/logs/elk-dataset-2.csv"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["dataset2"]
  }
}

filter {
  if "dataset1" in [tags] {
    csv {
      separator => ","
      columns => [
        "Device Time","Source IP Address","Source Port",
        "Source Protocol","Source Geolocation Country",
        "Source Geolocation City","source_geo_lat","source_geo_lon",
        "Source Organization","Event Type","Event Severity",
        "Destination IP Address","Destination Port",
        "Destination Protocol","Destination Geolocation Country",
        "Destination Geolocation City","dest_geo_lat","dest_geo_lon",
        "Destination Organization","Details"
      ]
    }
    date {
      match => [ "Device Time", "MMM dd, yyyy @ HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
    mutate {
      convert => {
        "source_geo_lat" => "float"
        "source_geo_lon" => "float"
        "dest_geo_lat"   => "float"
        "dest_geo_lon"   => "float"
        "Source Port"    => "integer"
        "Destination Port" => "integer"
      }
      add_field => {
        "[source_geo][lat]" => "%{source_geo_lat}"
        "[source_geo][lon]" => "%{source_geo_lon}"
        "[dest_geo][lat]"   => "%{dest_geo_lat}"
        "[dest_geo][lon]"   => "%{dest_geo_lon}"
      }
    }
    mutate {
      convert => {
        "[source_geo][lat]" => "float"
        "[source_geo][lon]" => "float"
        "[dest_geo][lat]"   => "float"
        "[dest_geo][lon]"   => "float"
      }
      remove_field => ["source_geo_lat","source_geo_lon","dest_geo_lat","dest_geo_lon"]
    }
    if [Source IP Address] == "Source IP Address" { drop {} }
  }

  if "dataset2" in [tags] {
    csv {
      separator => ","
      columns => [
        "timestamp","source_ip","destination_ip",
        "source_country","service","destination_port",
        "protocol","action"
      ]
    }
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    mutate {
      convert => { "destination_port" => "integer" }
    }
    if [source_ip] == "source_ip" { drop {} }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "siem-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "<PASSWORD>"
  }
  stdout { codec => rubydebug }
}
